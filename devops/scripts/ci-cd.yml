# ============================================================
#  .github/workflows/ci-cd.yml
#  CI/CD Pipeline for BlockOTP
#  Triggers: push to main/develop, pull requests
# ============================================================

name: BlockOTP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/blockchain-otp

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: LINT + TEST (runs on every push/PR)
  # ──────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: otpdb_test
          POSTGRES_USER: otpuser
          POSTGRES_PASSWORD: otppass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend tests ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test -- --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://otpuser:otppass@localhost:5432/otpdb_test
          JWT_SECRET: test-secret-key

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend/coverage

      # ── Frontend tests ─────────────────────────────────
      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test -- --run

      - name: Build frontend
        run: cd frontend && npm run build

      # ── Go chaincode tests ─────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: chaincode/go.sum

      - name: Test chaincode
        run: cd chaincode && go mod tidy && go test ./... -v -count=1

      - name: Vet chaincode
        run: cd chaincode && go vet ./...

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD + PUSH DOCKER IMAGES (main branch only)
  # ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 3: DEPLOY TO SERVER (main branch only)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://otp.yourdomain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/blockchain-otp

            # Pull latest images
            docker pull ghcr.io/${{ github.repository_owner }}/blockchain-otp-backend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/blockchain-otp-frontend:latest

            # Rolling restart (zero downtime)
            docker-compose up -d --no-deps backend
            sleep 10
            docker-compose up -d --no-deps frontend
            sleep 5
            docker-compose up -d --no-deps nginx

            # Verify deployment
            curl -sf http://localhost:4000/health || (echo "Health check failed!" && exit 1)

            # Clean up old images
            docker image prune -f

            echo "Deployment successful!"

      - name: Notify on success
        if: success()
        run: echo "Deployment to production completed successfully"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment FAILED — check logs"
