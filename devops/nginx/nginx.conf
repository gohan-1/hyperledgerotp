# ============================================================
#  nginx.conf — Reverse Proxy for BlockOTP
#  Handles: SSL termination, routing, rate limiting, headers
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ──────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  # ── Rate limiting zones ───────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m      rate=20r/s;
  limit_req_zone $binary_remote_addr zone=otp:10m      rate=1r/s;
  limit_req_zone $binary_remote_addr zone=static:10m   rate=50r/s;
  limit_conn_zone $binary_remote_addr zone=connlimit:10m;

  # ── Upstream services ─────────────────────────────────────
  upstream backend {
    server backend:4000;
    keepalive 32;
  }

  upstream frontend {
    server frontend:80;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name otp.yourdomain.com;

    # SSL certificates (replace with your certs or Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    limit_conn connlimit 20;

    # ── API routes → backend ──────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;

      # CORS preflight
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  $http_origin;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        add_header Access-Control-Max-Age 86400;
        return 204;
      }
    }

    # Stricter rate limit for OTP endpoints specifically
    location /api/otp/ {
      limit_req zone=otp burst=5 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check (no rate limit)
    location /health {
      proxy_pass http://backend;
      access_log off;
    }

    # ── Frontend static files ─────────────────────────────
    location / {
      limit_req zone=static burst=100 nodelay;
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # Cache static assets
      location ~* \.(js|css|png|jpg|ico|woff2)$ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
